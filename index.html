<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bordro Planner - Kararlı Sürüm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div id="loader" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-indigo-600 font-bold">Veriler Getiriliyor...</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold">Bordro Planner</h1>
        <button onclick="openModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">+ Yeni İş</button>
    </header>

    <div id="board" class="flex gap-4 overflow-x-auto"></div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-80">
            <input id="title" class="w-full border p-2 mb-4 rounded" placeholder="İş Başlığı">
            <select id="user" class="w-full border p-2 mb-4 rounded">
                <option value="Eren">Eren</option>
                <option value="Oguz">Oğuz</option>
            </select>
            <button onclick="saveTask()" class="w-full bg-indigo-600 text-white py-2 rounded">KAYDET</button>
            <button onclick="closeModal()" class="w-full mt-2 text-xs text-slate-400">İptal</button>
        </div>
    </div>

    <script>
        // BURAYA ALDIĞINIZ LINKI OLDUĞU GİBİ YAPIŞTIRIN, KOD KENDİSİ DÜZELTECEKTİR
        const RAW_URL = "https://script.google.com/a/macros/s/AKfycbwYwUR24bZUscHe1d7bv1sYWWKJlw8Jg73pAV3sC4DwAJQCPWfSc5VNbEauvrirq3Nu/exec";
        
        // URL Temizleme Fonksiyonu
        const API_URL = RAW_URL.replace("/a/macros/defacto.com", "").replace("/a/macros/", "/macros/");

        let tasks = [];

        async function fetchData() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const response = await fetch(API_URL + "?t=" + Date.now());
                const text = await response.text();
                
                // Gelen yanıtın JSON olup olmadığını kontrol et
                try {
                    tasks = JSON.parse(text);
                } catch (e) {
                    console.error("Gelen veri JSON değil:", text);
                    tasks = []; // Hata varsa listeyi boşalt ki ekran çökmesin
                }
                render();
            } catch (err) {
                console.error("Fetch Hatası:", err);
            }
            document.getElementById('loader').style.display = 'none';
        }

        async function pushData() {
            render();
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(tasks)
            });
            setTimeout(fetchData, 2000);
        }

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const cols = ['Backlog', 'Todo', 'InProgress', 'Done'];
            
            cols.forEach(status => {
                const colTasks = tasks.filter(t => t.status === status);
                const col = document.createElement('div');
                col.className = 'min-w-[250px] bg-slate-200/50 p-4 rounded-xl';
                col.innerHTML = `<h2 class="font-bold mb-4 text-xs uppercase text-slate-400">${status} (${colTasks.length})</h2>`;
                
                colTasks.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-3 rounded-lg shadow-sm mb-2 text-sm font-semibold border border-slate-100';
                    card.innerText = `${t.title} (${t.user})`;
                    col.appendChild(card);
                });
                board.appendChild(col);
            });
        }

        function saveTask() {
            const title = document.getElementById('title').value;
            if(!title) return;
            tasks.push({
                id: Date.now().toString(),
                title: title,
                user: document.getElementById('user').value,
                status: 'Todo',
                date: new Date().toLocaleDateString()
            });
            closeModal();
            pushData();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        fetchData();
    </script>
</body>
</html>
