<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Planner AI - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .kanban-col { min-width: 300px; max-width: 300px; }
        .active-nav { background-color: #EEF2FF; color: #4F46E5; font-weight: 700; }
        .dragging { opacity: 0.5; transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="app" class="flex h-screen">
        <aside class="w-64 bg-white border-r flex flex-col z-20">
            <div class="h-20 flex items-center px-6 border-b">
                <div class="bg-indigo-600 p-2 rounded-lg mr-2 shadow-lg"><i data-lucide="sparkles" class="text-white w-5 h-5"></i></div>
                <span class="font-extrabold text-lg text-indigo-600 tracking-tight">Bordro Planner</span>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <div onclick="switchTab('board')" id="nav-board" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer active-nav transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Pano Görünümü</span>
                </div>
                <div onclick="switchTab('archive')" id="nav-archive" class="flex items-center gap-3 p-3 text-slate-500 hover:bg-slate-50 rounded-xl cursor-pointer transition-all">
                    <i data-lucide="archive" class="w-5 h-5"></i><span>Arşivlenmiş İşler</span>
                </div>
                <div class="flex items-center gap-3 p-3 text-slate-500 hover:bg-slate-50 rounded-xl cursor-pointer">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i><span>Raporlar & Analiz</span>
                </div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <h1 id="page-title" class="text-xl font-bold text-slate-800">İş Takip Panosu</h1>
                    <div class="h-6 w-[1px] bg-slate-200 mx-2"></div>
                    <div class="relative group">
                        <button class="flex items-center gap-2 text-sm font-semibold text-slate-600 border border-slate-200 px-4 py-1.5 rounded-full hover:bg-slate-50">
                            <i data-lucide="filter" class="w-4 h-4"></i> Kişiye Göre Filtrele
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg flex items-center gap-2 border border-indigo-100 font-semibold hover:bg-indigo-100"><i data-lucide="sparkles" class="w-4 h-4"></i> AI Analiz</button>
                    <button onclick="openModal('Todo')" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg shadow-indigo-100 flex items-center gap-2 hover:bg-indigo-700 transition-all"><i data-lucide="plus" class="w-4 h-4"></i> Yeni İş Ata</button>
                    <div class="flex items-center gap-3 pl-4 border-l ml-2">
                        <span class="text-xs font-bold text-slate-500">Hoş Geldiniz, Eren</span>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Eren" class="w-10 h-10 rounded-full border-2 border-indigo-100" />
                    </div>
                </div>
            </header>

            <div id="board-view" class="flex-1 overflow-x-auto p-6 flex gap-6">
                </div>

            <div id="archive-view" class="hidden flex-1 p-8 overflow-y-auto bg-slate-50">
                <div class="max-w-4xl mx-auto space-y-4" id="archive-list"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white w-[500px] p-8 rounded-3xl shadow-2xl border border-slate-100">
            <h2 class="text-xl font-bold mb-6 text-slate-800">Yeni İş Kalemi Ata</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">İş Başlığı</label>
                    <input id="task-title" type="text" placeholder="Görev adı..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-indigo-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">Açıklama</label>
                    <textarea id="task-desc" placeholder="Detaylar..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl h-24 outline-none focus:ring-2 ring-indigo-500"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">Termin Tarihi</label>
                        <input id="task-date" type="date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">Sorumlu Seç</label>
                        <select id="task-user" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            <option value="Eren">Eren Şenyurt</option>
                            <option value="Pinar">Pınar Zengin</option>
                            <option value="Burcu">Burcu Gülbaz Ünlü</option>
                            <option value="Ebru">Ebru Bulut</option>
                            <option value="Oguz">Oğuz Güleç</option>
                            <option value="Yasin">Yasin Alper</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 font-bold hover:text-slate-600">Vazgeç</button>
                <button onclick="addTask()" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">Görevi Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        const COL_CONFIG = {
            'Backlog': { color: 'bg-slate-400', label: 'BACKLOG' },
            'Todo': { color: 'bg-amber-400', label: 'TODO' },
            'InProgress': { color: 'bg-blue-500', label: 'IN PROGRESS' },
            'Done': { color: 'bg-emerald-500', label: 'DONE' }
        };

        const USERS = {
            'Eren': 'https://api.dicebear.com/7.x/avataaars/svg?seed=Eren',
            'Pinar': 'https://api.dicebear.com/7.x/avataaars/svg?seed=Pinar',
            'Burcu': 'https://api.dicebear.com/7.x/avataaars/svg?seed=Burcu',
            'Ebru': 'https://api.dicebear.com/7.x/avataaars/svg?seed=Ebru',
            'Oguz': 'https://api.dicebear.com/7.x/avataaars/svg?seed=Oguz',
            'Yasin': 'https://api.dicebear.com/7.x/avataaars/svg?seed=Yasin'
        };

        let tasks = JSON.parse(localStorage.getItem('bordroTasks')) || [];
        let activeTab = 'board';
        let currentModalCol = 'Todo';

        function render() {
            const board = document.getElementById('board-view');
            const archive = document.getElementById('archive-list');
            board.innerHTML = '';
            archive.innerHTML = '';

            if (activeTab === 'board') {
                Object.keys(COL_CONFIG).forEach(colId => {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'kanban-col flex flex-col gap-4';
                    
                    const colTasks = tasks.filter(t => t.status === colId && !t.archived);
                    
                    colDiv.innerHTML = `
                        <div class="flex items-center justify-between px-1">
                            <div class="flex items-center gap-2 font-bold text-[11px] text-slate-400 uppercase tracking-widest">
                                <div class="w-2 h-2 rounded-full ${COL_CONFIG[colId].color}"></div>
                                ${COL_CONFIG[colId].label} <span class="ml-1 opacity-50">${colTasks.length}</span>
                            </div>
                            <button onclick="openModal('${colId}')" class="text-slate-300 hover:text-indigo-600"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                        <div id="${colId}" class="task-list flex-1 space-y-3 min-h-[150px]" ondragover="allowDrop(event)" ondrop="drop(event, '${colId}')"></div>
                    `;
                    board.appendChild(colDiv);
                    
                    const list = colDiv.querySelector('.task-list');
                    colTasks.forEach(task => list.appendChild(createCard(task)));
                });
            } else {
                tasks.filter(t => t.archived).forEach(task => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between";
                    div.innerHTML = `<div><h4 class="font-bold">${task.title}</h4><p class="text-xs text-slate-500">${task.desc}</p></div>
                                    <button onclick="restoreTask('${task.id}')" class="text-indigo-600 font-bold text-xs">Geri Al</button>`;
                    archive.appendChild(div);
                });
            }
            localStorage.setItem('bordroTasks', JSON.stringify(tasks));
            lucide.createIcons();
        }

        function createCard(task) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-2xl border border-slate-100 shadow-sm cursor-grab active:cursor-grabbing hover:border-indigo-300 transition-all";
            card.draggable = true;
            card.id = task.id;
            card.ondragstart = (e) => { e.dataTransfer.setData('text', task.id); card.classList.add('dragging'); };
            card.ondragend = () => card.classList.remove('dragging');
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <h4 class="text-sm font-bold text-slate-800 leading-tight">${task.title}</h4>
                    <button onclick="deleteTask('${task.id}')" class="text-slate-200 hover:text-red-500"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                </div>
                <p class="text-[11px] text-slate-500 line-clamp-2 mb-4">${task.desc || ''}</p>
                <div class="flex items-center justify-between border-t border-slate-50 pt-3">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">📅 ${task.date || '---'}</span>
                    <img src="${USERS[task.user] || USERS.Eren}" class="w-6 h-6 rounded-full border border-slate-100" />
                </div>
            `;
            return card;
        }

        function allowDrop(e) { e.preventDefault(); }
        function drop(e, status) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = status;
                if (status === 'Done') task.archived = true;
                render();
            }
        }

        function openModal(col) { currentModalCol = col; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function addTask() {
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-desc').value;
            const date = document.getElementById('task-date').value;
            const user = document.getElementById('task-user').value;
            
            if (!title) return alert("Lütfen bir başlık girin");
            
            tasks.push({
                id: Date.now().toString(),
                title, desc, 
                status: currentModalCol, 
                date: date ? date.split('-').reverse().slice(0,2).join('.') : '---',
                user: user,
                archived: false
            });
            
            render();
            closeModal();
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('board-view').classList.toggle('hidden', tab !== 'board');
            document.getElementById('archive-view').classList.toggle('hidden', tab !== 'archive');
            document.getElementById('nav-board').classList.toggle('active-nav', tab === 'board');
            document.getElementById('nav-archive').classList.toggle('active-nav', tab === 'archive');
            render();
        }

        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); render(); }
        function restoreTask(id) { 
            const task = tasks.find(t => t.id === id);
            if(task) { task.archived = false; task.status = 'Todo'; }
            render();
        }

        render();
    </script>
</body>
</html>
