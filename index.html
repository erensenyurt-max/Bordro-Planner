<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bordro Planner Pro - Stabil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; }
        .kanban-col { min-width: 300px; max-width: 300px; height: 85vh; }
    </style>
</head>
<body class="p-6">
    <div id="loader" class="fixed inset-0 bg-white/90 flex flex-col items-center justify-center z-50">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-indigo-600 font-bold">Veriler Senkronize Ediliyor...</p>
    </div>

    <div class="max-w-[1400px] mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">PLANNER PRO</h1>
                <select id="user-filter" onchange="render()" class="bg-slate-100 border-none rounded-xl px-4 py-2 text-sm font-bold outline-none cursor-pointer">
                    <option value="all">Tüm Ekip</option>
                    <option value="Eren">Eren Şenyurt</option>
                    <option value="Oguz">Oğuz Güleç</option>
                </select>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:scale-105 transition-transform">+ Yeni İş</button>
        </header>

        <div id="board" class="flex gap-6 overflow-x-auto pb-10"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-[2rem] w-[400px] shadow-2xl">
            <h2 class="font-black text-xl mb-6 text-slate-800">İş Detayı</h2>
            <div class="space-y-4">
                <input id="title" class="w-full bg-slate-50 border-none p-4 rounded-2xl outline-none focus:ring-2 ring-indigo-500" placeholder="İş Başlığı">
                <select id="user" class="w-full bg-slate-50 border-none p-4 rounded-2xl outline-none font-bold">
                    <option value="Eren">Eren Şenyurt</option>
                    <option value="Oguz">Oğuz Güleç</option>
                </select>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 text-slate-400 font-bold">Vazgeç</button>
                <button onclick="saveTask()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // SİZİN URL'NİZİ BURAYA DÜZENLEYEREK YAPIŞTIRDIM
        const API_URL = "https://script.google.com/a/macros/s/AKfycbwzQKDqHUuPlsZvYn5PnNpYFKOcx6CKT0Sn_WNw7IPT-QMhgZ3Sjvnk9CDYgVk1CToY/exec";

        let tasks = [];

        async function fetchData() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const r = await fetch(API_URL + "?t=" + Date.now());
                const d = await r.json();
                tasks = Array.isArray(d) ? d : [];
                render();
            } catch (e) {
                console.error("Veri alınamadı");
                // Hata olsa bile ekranı boşaltma, eskileri göster
                render();
            }
            document.getElementById('loader').style.display = 'none';
        }

        async function pushData() {
            render();
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(tasks)
            });
            setTimeout(fetchData, 1500);
        }

        function render() {
            const container = document.getElementById('board');
            const filter = document.getElementById('user-filter').value;
            container.innerHTML = '';
            
            const statuses = ['Backlog', 'Todo', 'InProgress', 'Done'];
            
            statuses.forEach(s => {
                const colTasks = tasks.filter(t => t.status === s && (filter === 'all' || t.user === filter));
                const col = document.createElement('div');
                col.className = 'kanban-col bg-slate-200/40 p-4 rounded-[2rem] border border-slate-200/50';
                col.innerHTML = `<h3 class="font-black text-slate-400 text-[10px] mb-6 uppercase tracking-[0.2em] text-center">${s} (${colTasks.length})</h3>`;
                
                colTasks.forEach(t => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-2xl shadow-sm mb-4 border border-white hover:border-indigo-400 transition-all cursor-pointer";
                    card.innerHTML = `
                        <div class="font-bold text-sm text-slate-800 leading-snug mb-4">${t.title}</div>
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md uppercase">${t.user}</span>
                            <span class="text-[9px] text-slate-400 font-bold">${t.date}</span>
                        </div>`;
                    col.appendChild(card);
                });
                container.appendChild(col);
            });
        }

        function saveTask() {
            const title = document.getElementById('title').value;
            if(!title) return alert("Başlık giriniz");
            tasks.push({
                id: Date.now().toString(),
                title: title,
                user: document.getElementById('user').value,
                status: 'Todo',
                date: new Date().toLocaleDateString('tr-TR')
            });
            closeModal();
            pushData();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        fetchData();
    </script>
</body>
</html>
