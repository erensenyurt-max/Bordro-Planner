<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Planner Pro - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .kanban-col { min-width: 300px; max-width: 300px; height: calc(100vh - 120px); }
        .active-nav { background-color: #EEF2FF; color: #4F46E5; font-weight: 700; }
        .dragging { opacity: 0.5; }
        #loader-overlay { background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); z-index: 9999; display: none; }
    </style>
</head>
<body>
    <div id="loader-overlay" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r flex flex-col">
            <div class="h-20 flex items-center px-6 border-b">
                <span class="font-extrabold text-lg text-indigo-600">Bordro Planner</span>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <div onclick="switchTab('board')" id="nav-board" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer active-nav">
                    <i data-lucide="layout-dashboard"></i><span>Pano Görünümü</span>
                </div>
                <div onclick="switchTab('archive')" id="nav-archive" class="flex items-center gap-3 p-3 text-slate-500 rounded-xl cursor-pointer">
                    <i data-lucide="archive"></i><span>Arşivlenmiş İşler</span>
                </div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8">
                <h1 id="page-title" class="text-xl font-bold text-slate-800">İş Takip Panosu</h1>
                <div class="flex gap-3">
                    <button onclick="fetchData()" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-indigo-600 uppercase tracking-tighter">
                        <i data-lucide="refresh-cw" class="w-3 h-3 inline mr-1"></i> Yenile
                    </button>
                    <button onclick="openModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg shadow-indigo-100 transition-all flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Yeni İş Ata
                    </button>
                </div>
            </header>
            <div id="board-view" class="flex-1 overflow-x-auto p-6 flex gap-6"></div>
            <div id="archive-view" class="hidden flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="archive-list" class="max-w-4xl mx-auto space-y-4"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[1000]">
        <div class="bg-white w-[450px] p-8 rounded-3xl shadow-2xl">
            <h2 id="modal-title" class="text-xl font-bold mb-6 text-slate-800">İş Kalemi Ata</h2>
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input id="task-title" type="text" placeholder="Başlık" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-indigo-500">
                <textarea id="task-desc" placeholder="Açıklama" class="w-full p-3 bg-slate-50 border rounded-xl h-24 outline-none focus:ring-2 ring-indigo-500"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="task-date" type="date" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    <select id="task-user" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        <option value="Eren">Eren Şenyurt</option>
                        <option value="Pinar">Pınar Zengin</option>
                        <option value="Oguz">Oğuz Güleç</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 font-bold">Vazgeç</button>
                <button onclick="saveTask()" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // --- BURAYA KENDI URL'NIZI YAPIŞTIRIN ---
        const SHEET_API_URL = "https://script.google.com/a/macros/s/AKfycbwKeZ1TR03ZWDAyvER4Y5bxdC3Pu6-d4tXP9b6f2-coSqTY0e4A4kCwn6abB8L5Di_h/exec"; 

        let tasks = [];
        let activeTab = 'board';

        async function fetchData() {
            document.getElementById('loader-overlay').style.display = 'flex';
            try {
                const response = await fetch(SHEET_API_URL);
                const data = await response.json();
                tasks = data.slice(1).map(r => ({
                    id: String(r[0]), title: String(r[1]), desc: String(r[2]), 
                    date: String(r[3]), user: String(r[4]), status: String(r[5]), archived: String(r[6]).toUpperCase() === "TRUE"
                }));
                render();
            } catch (e) { console.error("Veri çekilemedi", e); }
            document.getElementById('loader-overlay').style.display = 'none';
        }

        async function pushData() {
            try {
                await fetch(SHEET_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(tasks)
                });
            } catch (e) { console.error("Kayıt hatası", e); }
        }

        function render() {
            const board = document.getElementById('board-view');
            const archive = document.getElementById('archive-list');
            board.innerHTML = ''; archive.innerHTML = '';

            if (activeTab === 'board') {
                ['Backlog', 'Todo', 'InProgress', 'Done'].forEach(status => {
                    const colTasks = tasks.filter(t => t.status === status && !t.archived);
                    const colDiv = document.createElement('div');
                    colDiv.className = 'kanban-col flex flex-col gap-4';
                    colDiv.innerHTML = `
                        <div class="font-bold text-[11px] text-slate-400 uppercase tracking-widest px-1">${status} (${colTasks.length})</div>
                        <div id="${status}" class="flex-1 space-y-3 p-2 rounded-xl" ondragover="event.preventDefault()" ondrop="drop(event, '${status}')"></div>`;
                    board.appendChild(colDiv);
                    colTasks.forEach(task => colDiv.querySelector('.flex-1').appendChild(createCard(task)));
                });
            } else {
                tasks.filter(t => t.archived).forEach(task => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm";
                    div.innerHTML = `<div><h4 class="font-bold">${task.title}</h4><p class="text-xs text-slate-400">${task.user} - ${task.date}</p></div>
                    <button onclick="restoreTask('${task.id}')" class="text-indigo-600 font-bold text-xs">Geri Al</button>`;
                    archive.appendChild(div);
                });
            }
            lucide.createIcons();
        }

        function createCard(t) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-2xl border border-slate-100 shadow-sm cursor-grab active:cursor-grabbing hover:border-indigo-300 transition-all";
            card.draggable = true; card.id = t.id;
            card.ondragstart = (e) => { e.dataTransfer.setData('text', t.id); card.classList.add('dragging'); };
            card.ondragend = () => card.classList.remove('dragging');
            card.onclick = (e) => { if(!e.target.closest('button')) openEditModal(t.id); };
            card.innerHTML = `<h4 class="text-sm font-bold text-slate-800">${t.title}</h4><p class="text-[11px] text-slate-500 mb-4 line-clamp-1">${t.desc || ''}</p>
                <div class="flex justify-between items-center pt-2 border-t border-slate-50">
                    <span class="text-[9px] font-bold text-slate-400 uppercase">📅 ${t.date}</span>
                    <span class="text-[9px] font-bold text-indigo-600">${t.user.toUpperCase()}</span>
                </div>`;
            return card;
        }

        function drop(e, status) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = status;
                task.archived = (status === 'Done');
                render(); // Önce ekranda güncelle (Hızlı tepki)
                pushData(); // Sonra arka planda kaydet
            }
        }

        function saveTask() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-desc').value;
            const date = document.getElementById('task-date').value;
            const user = document.getElementById('task-user').value;

            if (id) {
                const idx = tasks.findIndex(t => t.id === id);
                tasks[idx] = { ...tasks[idx], title, desc, date, user };
            } else {
                tasks.push({ id: Date.now().toString(), title, desc, date, user, status: 'Todo', archived: false });
            }
            render(); closeModal(); pushData();
        }

        function switchTab(t) {
            activeTab = t;
            document.getElementById('board-view').classList.toggle('hidden', t !== 'board');
            document.getElementById('archive-view').classList.toggle('hidden', t !== 'archive');
            document.getElementById('nav-board').classList.toggle('active-nav', t === 'board');
            document.getElementById('nav-archive').classList.toggle('active-nav', t === 'archive');
            render();
        }

        function openModal() { document.getElementById('edit-id').value = ''; document.getElementById('modal').classList.remove('hidden'); }
        function openEditModal(id) {
            const t = tasks.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('task-title').value = t.title;
            document.getElementById('task-desc').value = t.desc;
            document.getElementById('task-date').value = t.date;
            document.getElementById('task-user').value = t.user;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function restoreTask(id) { const t = tasks.find(x => x.id === id); t.archived = false; t.status = 'Todo'; render(); pushData(); }

        fetchData();
    </script>
</body>
</html>
