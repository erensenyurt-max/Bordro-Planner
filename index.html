<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Planner Pro - Kurumsal Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .kanban-col { min-width: 300px; max-width: 300px; }
        .loading-overlay { background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 100; display: none; }
    </style>
</head>
<body>
    <div id="loader" class="fixed inset-0 loading-overlay flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600">Bulut Verileri Senkronize Ediliyor...</p>
    </div>

    <div id="app" class="flex h-screen">
        <aside class="w-64 bg-white border-r flex flex-col z-20">
            <div class="h-20 flex items-center px-6 border-b">
                <div class="bg-indigo-600 p-2 rounded-lg mr-2 shadow-lg"><i data-lucide="sparkles" class="text-white w-5 h-5"></i></div>
                <span class="font-extrabold text-lg text-indigo-600 tracking-tight">Bordro Planner</span>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <div onclick="switchTab('board')" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-indigo-50 transition-all text-slate-600" id="btn-board">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Pano Görünümü</span>
                </div>
                <div onclick="switchTab('archive')" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-indigo-50 transition-all text-slate-600" id="btn-archive">
                    <i data-lucide="archive" class="w-5 h-5"></i><span>Arşivlenmiş İşler</span>
                </div>
            </nav>
            <div class="p-4 border-t">
                <button onclick="fetchData()" class="w-full py-2 text-xs font-bold text-slate-400 hover:text-indigo-600 flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> VERİLERİ ZORLA YENİLE
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl font-bold text-slate-800">İş Takip Panosu</h1>
                    <select id="user-filter" onchange="render()" class="border border-slate-200 px-4 py-2 rounded-full text-sm font-semibold outline-none focus:ring-2 ring-indigo-500">
                        <option value="all">Tüm Personeller</option>
                        <option value="Eren">Eren Şenyurt</option>
                        <option value="Pinar">Pınar Zengin</option>
                        <option value="Burcu">Burcu Gülbaz Ünlü</option>
                        <option value="Ebru">Ebru Bulut</option>
                        <option value="Oguz">Oğuz Güleç</option>
                        <option value="Yasin">Yasin Alper</option>
                    </select>
                </div>
                <button onclick="openModal('Todo')" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-indigo-700 transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Yeni İş Ata
                </button>
            </header>

            <div id="board-view" class="flex-1 overflow-x-auto p-6 flex gap-6 bg-[#F4F7FB]"></div>
            <div id="archive-view" class="hidden flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="archive-list" class="max-w-4xl mx-auto space-y-4"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white w-[450px] p-8 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Görev Detayı</h2>
            <div class="space-y-4">
                <input id="task-title" type="text" placeholder="İş Başlığı" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                <textarea id="task-desc" placeholder="Açıklama" class="w-full p-3 bg-slate-50 border rounded-xl h-24 outline-none"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="task-date" type="date" class="w-full p-3 bg-slate-50 border rounded-xl">
                    <select id="task-user" class="w-full p-3 bg-slate-50 border rounded-xl">
                        <option value="Eren">Eren Şenyurt</option>
                        <option value="Pinar">Pınar Zengin</option>
                        <option value="Burcu">Burcu Gülbaz Ünlü</option>
                        <option value="Ebru">Ebru Bulut</option>
                        <option value="Oguz">Oğuz Güleç</option>
                        <option value="Yasin">Yasin Alper</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 font-bold">Vazgeç</button>
                <button onclick="saveTask()" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // BURAYI KENDİ URL'NİZ İLE DEĞİŞTİRİN
        const SHEET_API_URL = "https://script.google.com/a/macros/defacto.com/s/AKfycbyp20QYPDSbT-8lzu0eclEfctngiRj8vpwCon4y6yxVaxyKTMYIO5cQFbXGXE49fcmX/exec"; 

        let tasks = [];
        let activeTab = 'board';

        async function fetchData() {
            if(!SHEET_API_URL.startsWith("http")) return;
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(SHEET_API_URL);
                const data = await res.json();
                tasks = data.slice(1).map(r => ({
                    id: r[0], title: r[1], desc: r[2], date: r[3], user: r[4], status: r[5], archived: r[6] == "TRUE"
                }));
                render();
            } catch (e) { console.error("Hata:", e); }
            document.getElementById('loader').style.display = 'none';
        }

        async function pushData() {
            document.getElementById('loader').style.display = 'flex';
            await fetch(SHEET_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(tasks) });
            setTimeout(fetchData, 1500);
        }

        function render() {
            const board = document.getElementById('board-view');
            const archive = document.getElementById('archive-list');
            const filter = document.getElementById('user-filter').value;
            board.innerHTML = ''; archive.innerHTML = '';

            const filtered = filter === 'all' ? tasks : tasks.filter(t => t.user === filter);

            if(activeTab === 'board') {
                ['Backlog', 'Todo', 'InProgress', 'Done'].forEach(status => {
                    const colTasks = filtered.filter(t => t.status === status && !t.archived);
                    const col = document.createElement('div');
                    col.className = 'kanban-col flex flex-col gap-4';
                    col.innerHTML = `<h3 class="font-bold text-slate-400 text-xs uppercase px-2">${status} (${colTasks.length})</h3>
                                    <div class="flex-1 space-y-3 min-h-[200px]" ondragover="event.preventDefault()" ondrop="drop(event, '${status}')"></div>`;
                    board.appendChild(col);
                    colTasks.forEach(t => col.querySelector('div').appendChild(createCard(t)));
                });
            } else {
                filtered.filter(t => t.archived).forEach(t => {
                    const item = document.createElement('div');
                    item.className = "bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm";
                    item.innerHTML = `<div><h4 class="font-bold">${t.title}</h4><p class="text-xs text-slate-400">${t.user} - ${t.date}</p></div>
                                      <button onclick="restore('${t.id}')" class="text-indigo-600 font-bold text-xs">Geri Al</button>`;
                    archive.appendChild(item);
                });
            }
            lucide.createIcons();
        }

        function createCard(t) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-2xl border border-slate-100 shadow-sm cursor-grab active:cursor-grabbing hover:border-indigo-300";
            card.draggable = true;
            card.ondragstart = (e) => e.dataTransfer.setData('text', t.id);
            card.innerHTML = `<h4 class="text-sm font-bold text-slate-800 mb-1">${t.title}</h4>
                             <p class="text-[11px] text-slate-500 mb-3">${t.desc || ''}</p>
                             <div class="flex justify-between items-center pt-2 border-t text-[10px] font-bold text-slate-400 uppercase">
                                <span>📅 ${t.date}</span><span>${t.user}</span>
                             </div>`;
            return card;
        }

        function drop(e, status) {
            const id = e.dataTransfer.getData('text');
            const task = tasks.find(t => t.id == id);
            if(task) { task.status = status; task.archived = status === 'Done'; pushData(); }
        }

        function saveTask() {
            const title = document.getElementById('task-title').value;
            const user = document.getElementById('task-user').value;
            if(!title) return;
            tasks.push({ id: Date.now(), title, desc: document.getElementById('task-desc').value, date: document.getElementById('task-date').value, user, status: 'Todo', archived: false });
            closeModal(); pushData();
        }

        function switchTab(t) { activeTab = t; render(); }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function restore(id) { const t = tasks.find(x => x.id == id); t.archived = false; t.status = 'Todo'; pushData(); }

        fetchData();
    </script>
</body>
</html>
