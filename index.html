<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Planner Pro - Canlı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .kanban-col { min-width: 300px; max-width: 300px; height: calc(100vh - 150px); }
        .active-nav { background-color: #EEF2FF; color: #4F46E5; font-weight: 700; }
        #loader { background: rgba(255,255,255,0.9); z-index: 9999; display: flex; position: fixed; inset: 0; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-indigo-600 font-bold">Veriler Getiriliyor...</p>
    </div>

    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r flex flex-col p-4 shrink-0">
            <div class="flex items-center gap-2 mb-8 px-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg text-white font-bold">BP</div>
                <h1 class="text-xl font-black text-slate-800">Planner</h1>
            </div>
            <nav class="flex-1 space-y-2">
                <div onclick="switchTab('board')" id="nav-board" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer active-nav">
                    <span>📋 Pano Görünümü</span>
                </div>
                <div onclick="switchTab('archive')" id="nav-archive" class="flex items-center gap-3 p-3 text-slate-500 rounded-xl cursor-pointer">
                    <span>📦 Arşivlenmiş İşler</span>
                </div>
            </nav>
            <button onclick="fetchData()" class="mt-4 w-full py-2 bg-slate-50 text-[10px] font-bold text-slate-400 rounded-lg hover:text-indigo-600 uppercase border border-dashed border-slate-200">
                🔄 Manuel Senkronize
            </button>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-lg font-bold text-slate-800">Canlı Ekip Panosu</h2>
                    <select id="user-filter" onchange="render()" class="bg-slate-50 border border-slate-200 rounded-full px-4 py-1.5 text-xs font-semibold outline-none cursor-pointer">
                        <option value="all">Filtre: Tüm Ekip</option>
                        <option value="Eren">Eren Şenyurt</option>
                        <option value="Oguz">Oğuz Güleç</option>
                        <option value="Ebru">Ebru Bulut</option>
                    </select>
                </div>
                <button onclick="openModal('Todo')" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-100 flex items-center gap-2 hover:bg-indigo-700 transition-all text-sm">
                    <span>+ Yeni İş Ata</span>
                </button>
            </header>
            
            <div id="board-view" class="flex-1 overflow-x-auto p-6 flex gap-6"></div>
            
            <div id="archive-view" class="hidden flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="archive-list" class="max-w-4xl mx-auto space-y-4"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[1000]">
        <div class="bg-white w-[450px] p-8 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-slate-800">Görev Bilgileri</h2>
            <div class="space-y-4">
                <input id="task-title" type="text" placeholder="İş Başlığı" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-indigo-500">
                <textarea id="task-desc" placeholder="Açıklama" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl h-24 outline-none focus:ring-2 ring-indigo-500"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="task-date" type="date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                    <select id="task-user" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        <option value="Eren">Eren Şenyurt</option>
                        <option value="Oguz">Oğuz Güleç</option>
                        <option value="Ebru">Ebru Bulut</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 font-bold">Vazgeç</button>
                <button onclick="saveTask()" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_API_URL = "https://script.google.com/a/macros/defacto.com/s/AKfycbzB1CEhsVI0WfHUR5s2KhyQdMqkq5ZK2sCkAZfTI-brH7Ywszw7cLfyFlqaUje_toV-/exec"; 
        
        let tasks = [];
        let activeTab = 'board';
        let currentStatus = 'Todo';

        // Buluttan Veri Çekme
        async function fetchData() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const response = await fetch(SHEET_API_URL + "?t=" + Date.now());
                const data = await response.json();
                if(data && Array.isArray(data)) {
                    tasks = data;
                }
                render();
            } catch (e) { console.error("Hata:", e); }
            document.getElementById('loader').style.display = 'none';
        }

        // Buluta Veri Gönderme
        async function pushData() {
            try {
                await fetch(SHEET_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(tasks)
                });
                setTimeout(fetchData, 1000);
            } catch (e) { console.error("Kayıt Hatası:", e); }
        }

        function render() {
            const board = document.getElementById('board-view');
            const archive = document.getElementById('archive-list');
            const filterUser = document.getElementById('user-filter').value;
            
            board.innerHTML = ''; archive.innerHTML = '';
            let filtered = filterUser === 'all' ? tasks : tasks.filter(t => t.user === filterUser);

            if (activeTab === 'board') {
                ['Backlog', 'Todo', 'InProgress', 'Done'].forEach(status => {
                    const colTasks = filtered.filter(t => t.status === status && !t.archived);
                    const colDiv = document.createElement('div');
                    colDiv.className = 'kanban-col flex flex-col gap-4';
                    colDiv.innerHTML = `
                        <div class="flex items-center justify-between px-2">
                            <div class="font-bold text-[11px] text-slate-400 uppercase tracking-widest">${status} (${colTasks.length})</div>
                            <button onclick="openModal('${status}')" class="text-slate-300 hover:text-indigo-600 font-bold text-xl">+</button>
                        </div>
                        <div id="list-${status}" class="flex-1 space-y-3 p-1 rounded-xl" ondragover="event.preventDefault()" ondrop="drop(event, '${status}')"></div>
                    `;
                    board.appendChild(colDiv);
                    const listArea = document.getElementById(`list-${status}`);
                    colTasks.forEach(task => listArea.appendChild(createCard(task)));
                });
            } else {
                filtered.filter(t => t.archived).forEach(task => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm";
                    div.innerHTML = `
                        <div><h4 class="font-bold text-slate-800">${task.title}</h4><p class="text-xs text-slate-400">${task.user} - ${task.date}</p></div>
                        <button onclick="restoreTask('${task.id}')" class="text-indigo-600 font-bold text-xs">♻️ Geri Al</button>
                    `;
                    archive.appendChild(div);
                });
            }
        }

        function createCard(t) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-2xl border border-slate-100 card-shadow cursor-grab hover:border-indigo-300 transition-all relative group";
            card.draggable = true; card.id = t.id;
            card.ondragstart = (e) => e.dataTransfer.setData('text', t.id);
            card.innerHTML = `
                <button onclick="deleteTask('${t.id}')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500">✕</button>
                <h4 class="text-sm font-bold text-slate-800 leading-tight pr-4">${t.title}</h4>
                <div class="mt-4 flex justify-between items-center text-[9px] font-bold text-slate-400 uppercase">
                    <span>📅 ${t.date}</span><span class="text-indigo-600 font-black">${t.user}</span>
                </div>
            `;
            return card;
        }

        function drop(e, status) {
            const id = e.dataTransfer.getData('text');
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = status;
                task.archived = (status === 'Done');
                render();
                pushData();
            }
        }

        function saveTask() {
            const title = document.getElementById('task-title').value;
            if(!title) return alert("Başlık girin!");
            
            const tData = {
                id: Date.now().toString(),
                title: title,
                desc: document.getElementById('task-desc').value,
                date: document.getElementById('task-date').value,
                user: document.getElementById('task-user').value,
                status: currentStatus,
                archived: (currentStatus === 'Done')
            };
            tasks.push(tData);
            closeModal();
            render();
            pushData();
        }

        function openModal(status) {
            currentStatus = status || 'Todo';
            document.getElementById('task-title').value = '';
            document.getElementById('task-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function switchTab(t) { 
            activeTab = t; 
            document.getElementById('nav-board').classList.toggle('active-nav', t === 'board');
            document.getElementById('nav-archive').classList.toggle('active-nav', t === 'archive');
            document.getElementById('board-view').style.display = t === 'board' ? 'flex' : 'none';
            document.getElementById('archive-view').style.display = t === 'archive' ? 'block' : 'none';
            render(); 
        }
        function deleteTask(id) { if(confirm('Sil?')) { tasks = tasks.filter(x => x.id !== id); render(); pushData(); } }
        function restoreTask(id) { const t = tasks.find(x => x.id === id); t.archived = false; t.status = 'Todo'; render(); pushData(); }

        fetchData();
        setInterval(fetchData, 10000); // 10 saniyede bir canlandır
    </script>
</body>
</html>
