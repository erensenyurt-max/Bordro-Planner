<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bordro Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; }
        .kanban-col { min-width: 280px; height: 80vh; }
    </style>
</head>
<body class="p-4">
    <div id="app">
        <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
            <h1 class="text-xl font-bold text-indigo-600">Bordro Planner</h1>
            <div class="flex gap-4">
                <button onclick="fetchData()" class="px-4 py-2 text-xs font-bold text-slate-400 border rounded-xl hover:bg-slate-50">YENİLE</button>
                <button onclick="openModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">+ Yeni İş</button>
            </div>
        </div>
        
        <div id="board" class="flex gap-6 overflow-x-auto pb-4">
            </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl w-96">
            <h2 class="font-bold mb-4">Yeni Görev</h2>
            <input id="title" class="w-full border p-2 mb-2 rounded-lg" placeholder="Başlık">
            <select id="user" class="w-full border p-2 mb-4 rounded-lg">
                <option value="Eren">Eren</option>
                <option value="Oguz">Oğuz</option>
            </select>
            <button onclick="saveTask()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">KAYDET</button>
            <button onclick="closeModal()" class="w-full mt-2 text-slate-400 text-sm">Vazgeç</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/a/macros/defacto.com/s/AKfycbyqwdl2JiFqExUTGD6iDYiPJho68Hc1izzuJzxNJMRkhsAm2o7E-4rROGN4T74bpbAN/exec";
        let tasks = [];

        async function fetchData() {
            try {
                const r = await fetch(API_URL + "?t=" + Date.now());
                const d = await r.json();
                console.log("Gelen Veri:", d); // Tarayıcı konsoluna sağ tık - incele diyerek bakın
                tasks = Array.isArray(d) ? d : [];
                render();
            } catch (e) {
                console.error("Hata:", e);
                alert("Veri çekilemedi. Apps Script URL'sini kontrol edin.");
            }
        }

        async function pushData() {
            render();
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(tasks)
            });
            setTimeout(fetchData, 1500);
        }

        function render() {
            const container = document.getElementById('board');
            container.innerHTML = '';
            const statuses = ['Backlog', 'Todo', 'InProgress', 'Done'];
            
            statuses.forEach(s => {
                const colTasks = tasks.filter(t => t.status === s);
                const col = document.createElement('div');
                col.className = 'kanban-col bg-slate-100/50 p-4 rounded-2xl border-2 border-dashed border-slate-200';
                col.innerHTML = `<h3 class="font-bold text-slate-400 text-xs mb-4 uppercase">${s} (${colTasks.length})</h3>`;
                
                colTasks.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-4 rounded-xl shadow-sm mb-3 border border-slate-200';
                    card.innerHTML = `<div class="font-bold text-sm text-slate-800">${t.title}</div>
                                     <div class="text-[10px] text-indigo-500 font-bold mt-2 uppercase">${t.user}</div>`;
                    col.appendChild(card);
                });
                container.appendChild(col);
            });
        }

        function saveTask() {
            const title = document.getElementById('title').value;
            if(!title) return;
            tasks.push({
                id: Date.now().toString(),
                title: title,
                user: document.getElementById('user').value,
                status: 'Todo',
                archived: false,
                date: new Date().toLocaleDateString()
            });
            closeModal();
            pushData();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        fetchData();
    </script>
</body>
</html>
