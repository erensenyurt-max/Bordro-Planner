<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Planner AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F4F7FB; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-white border-r flex flex-col z-20">
            <div class="h-20 flex items-center px-6 border-b">
                <div class="bg-indigo-600 p-2 rounded-lg mr-2"><i data-lucide="sparkles" class="text-white w-5 h-5"></i></div>
                <span class="font-extrabold text-lg text-indigo-600 tracking-tight">AI Planner</span>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <div class="flex items-center gap-3 p-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold cursor-pointer"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Pano Görünümü</span></div>
                <div class="flex items-center gap-3 p-3 text-slate-500 hover:bg-slate-50 rounded-xl cursor-pointer"><i data-lucide="archive" class="w-5 h-5"></i><span>Arşiv</span></div>
            </nav>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8 z-10">
                <h1 class="text-xl font-bold">İş Takip Panosu</h1>
                <div class="flex items-center gap-4">
                    <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> Yeni İş Ata</button>
                    <div class="flex items-center gap-3 pl-4 border-l ml-2">
                        <span class="text-xs font-bold text-slate-500">Eren Şenyurt</span>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Eren" class="w-10 h-10 rounded-full border-2 border-indigo-100" />
                    </div>
                </div>
            </header>
            <div class="flex-1 overflow-x-auto p-6 flex gap-4">
                <div class="min-w-[300px] flex flex-col gap-3">
                    <div class="flex items-center gap-2 font-bold text-xs text-slate-500 uppercase tracking-widest"><div class="w-2 h-2 rounded-full bg-amber-400"></div> TODO</div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition-all cursor-pointer">
                        <h4 class="text-sm font-bold text-slate-800">Örnek: Bordro Analizi</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Mart verileri girilecek.</p>
                        <div class="mt-4 flex items-center justify-between border-t pt-3 text-[10px] font-bold text-slate-400 uppercase"><i data-lucide="calendar" class="w-3 h-3"></i> 24.04</div>
                    </div>
                </div>
                <div class="min-w-[300px] opacity-40"><div class="font-bold text-xs text-slate-400 uppercase p-2 border-b">IN PROGRESS</div></div>
                <div class="min-w-[300px] opacity-40"><div class="font-bold text-xs text-slate-400 uppercase p-2 border-b">DONE</div></div>
            </div>
        </main>
    </div>
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white w-[400px] p-6 rounded-2xl shadow-2xl">
            <h2 class="text-lg font-bold mb-4">Yeni İş Ekle</h2>
            <input type="text" placeholder="Başlık" class="w-full p-2 border rounded-lg mb-4 outline-none ring-indigo-500 focus:ring-2">
            <div class="flex justify-end gap-2"><button onclick="document.getElementById('modal').classList.add('hidden')" class="px-4 py-2 text-slate-400 font-bold">Kapat</button><button class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">Ekle</button></div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
