<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Planner - Canlı Toplantı Modu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .kanban-col { min-width: 300px; max-width: 300px; height: calc(100vh - 120px); }
        .active-nav { background-color: #EEF2FF; color: #4F46E5; font-weight: 700; }
        #loader-overlay { background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); z-index: 9999; display: none; }
    </style>
</head>
<body>
    <div id="loader-overlay" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r flex flex-col">
            <div class="h-20 flex items-center px-6 border-b">
                <span class="font-extrabold text-lg text-indigo-600">Bordro Planner</span>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <div onclick="switchTab('board')" id="nav-board" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer active-nav">
                    <i data-lucide="layout-dashboard"></i><span>Pano Görünümü</span>
                </div>
                <div onclick="switchTab('archive')" id="nav-archive" class="flex items-center gap-3 p-3 text-slate-500 rounded-xl cursor-pointer">
                    <i data-lucide="archive"></i><span>Arşivlenmiş İşler</span>
                </div>
            </nav>
            <div class="p-4 border-t flex flex-col gap-2">
                <button onclick="fetchData()" class="w-full py-2 bg-slate-100 text-[10px] font-bold text-slate-600 rounded-lg hover:bg-slate-200 uppercase">
                    <i data-lucide="refresh-cw" class="w-3 h-3 inline mr-1"></i> Anlık Senkronize Et
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl font-bold text-slate-800 tracking-tight">Canlı İş Panosu</h1>
                    <select id="user-filter" onchange="render()" class="bg-white border border-slate-200 rounded-full px-4 py-1.5 text-xs font-semibold outline-none cursor-pointer">
                        <option value="all">Filtrele: Tüm Ekip</option>
                        <option value="Eren">Eren Şenyurt</option>
                        <option value="Pinar">Pınar Zengin</option>
                        <option value="Oguz">Oğuz Güleç</option>
                    </select>
                </div>
                <button onclick="openModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg flex items-center gap-2 hover:bg-indigo-700 text-sm">
                    <i data-lucide="plus" class="w-4 h-4"></i> Yeni İş Ata
                </button>
            </header>
            <div id="board-view" class="flex-1 overflow-x-auto p-6 flex gap-6"></div>
            <div id="archive-view" class="hidden flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="archive-list" class="max-w-4xl mx-auto space-y-4"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[1000]">
        <div class="bg-white w-[450px] p-8 rounded-3xl shadow-2xl">
            <h2 id="modal-title" class="text-xl font-bold mb-6">İş Detayı</h2>
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input id="task-title" type="text" placeholder="Başlık" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                <textarea id="task-desc" placeholder="Açıklama" class="w-full p-3 bg-slate-50 border rounded-xl h-24 outline-none"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="task-date" type="date" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    <select id="task-user" class="w-full p-3 bg-slate-50 border rounded-xl">
                        <option value="Eren">Eren Şenyurt</option>
                        <option value="Pinar">Pınar Zengin</option>
                        <option value="Oguz">Oğuz Güleç</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 font-bold">İptal</button>
                <button onclick="saveTask()" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_API_URL = "https://script.google.com/a/macros/s/AKfycbwaXafcEsUmURSNZ0Pmz_GGklzPnLfG6TQtmEGZyYNWH6l3jjXS6KQ-iZtZ9GUz1B1d/exec"; 

        let tasks = [];
        let activeTab = 'board';

        async function fetchData() {
            try {
                const response = await fetch(SHEET_API_URL + "?t=" + new Date().getTime());
                const raw = await response.json();
                if(raw.error === "YETKISIZ_ERISIM") return;
                
                tasks = raw.slice(1).map(r => ({
                    id: String(r[0]), title: String(r[1]), desc: String(r[2]), 
                    date: String(r[3]), user: String(r[4]), status: String(r[5]), 
                    archived: String(r[6]).toUpperCase() === "TRUE"
                }));
                render();
            } catch (e) { console.error("Hata", e); }
        }

        async function pushData() {
            render(); // Önce ekranda güncelle
            await fetch(SHEET_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(tasks) });
            setTimeout(fetchData, 1000); // 1 sn sonra doğrula
        }

        function render() {
            const board = document.getElementById('board-view');
            const archive = document.getElementById('archive-list');
            const userFilter = document.getElementById('user-filter').value;
            
            board.innerHTML = ''; archive.innerHTML = '';
            let filtered = userFilter === 'all' ? tasks : tasks.filter(t => t.user === userFilter);

            if (activeTab === 'board') {
                ['Backlog', 'Todo', 'InProgress', 'Done'].forEach(status => {
                    const colTasks = filtered.filter(t => t.status === status && !t.archived);
                    const colDiv = document.createElement('div');
                    colDiv.className = 'kanban-col flex flex-col gap-4';
                    colDiv.innerHTML = `<div class="font-bold text-[11px] text-slate-400 uppercase tracking-widest px-1">${status} (${colTasks.length})</div>
                        <div id="${status}" class="flex-1 space-y-3 p-1" ondragover="event.preventDefault()" ondrop="drop(event, '${status}')"></div>`;
                    board.appendChild(colDiv);
                    colTasks.forEach(task => colDiv.querySelector('.flex-1').appendChild(createCard(task)));
                });
            } else {
                filtered.filter(t => t.archived).forEach(task => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-2xl border flex justify-between items-center";
                    div.innerHTML = `<div><h4 class="font-bold">${task.title}</h4><p class="text-xs text-slate-400">${task.user}</p></div>
                                    <button onclick="restoreTask('${task.id}')" class="text-indigo-600 font-bold text-xs">Geri Al</button>`;
                    archive.appendChild(div);
                });
            }
            lucide.createIcons();
        }

        function createCard(t) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-2xl border border-slate-100 shadow-sm cursor-grab active:cursor-grabbing hover:border-indigo-300";
            card.draggable = true; card.id = t.id;
            card.ondragstart = (e) => e.dataTransfer.setData('text', t.id);
            card.onclick = (e) => { if(!e.target.closest('button')) openEditModal(t.id); };
            card.innerHTML = `<h4 class="text-sm font-bold text-slate-800 leading-tight">${t.title}</h4>
                <div class="mt-4 flex justify-between items-center text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                    <span>📅 ${t.date}</span><span class="text-indigo-600">${t.user}</span>
                </div>`;
            return card;
        }

        function drop(e, status) {
            const id = e.dataTransfer.getData('text');
            const task = tasks.find(t => t.id === id);
            if (task) { task.status = status; task.archived = (status === 'Done'); pushData(); }
        }

        function saveTask() {
            const id = document.getElementById('edit-id').value;
            const tData = {
                id: id || Date.now().toString(),
                title: document.getElementById('task-title').value,
                desc: document.getElementById('task-desc').value,
                date: document.getElementById('task-date').value,
                user: document.getElementById('task-user').value,
                status: id ? tasks.find(x => x.id === id).status : 'Todo',
                archived: id ? tasks.find(x => x.id === id).archived : false
            };
            if (id) { const idx = tasks.findIndex(x => x.id === id); tasks[idx] = tData; }
            else { tasks.push(tData); }
            closeModal(); pushData();
        }

        function openModal() { document.getElementById('edit-id').value = ''; document.getElementById('modal').classList.remove('hidden'); }
        function openEditModal(id) {
            const t = tasks.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('task-title').value = t.title;
            document.getElementById('task-desc').value = t.desc;
            document.getElementById('task-date').value = t.date;
            document.getElementById('task-user').value = t.user;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function restoreTask(id) { const t = tasks.find(x => x.id === id); t.archived = false; t.status = 'Todo'; pushData(); }
        function switchTab(t) { activeTab = t; render(); }

        fetchData(); // İlk açılışta çek
        setInterval(fetchData, 5000); // Toplantı için 5 saniyede bir zorla güncelle
    </script>
</body>
</html>
