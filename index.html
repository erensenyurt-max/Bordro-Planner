<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Planner AI - En Güncel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F4F7FB; }
        .kanban-column { min-width: 300px; max-width: 350px; height: calc(100vh - 120px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="w-60 bg-white border-r flex flex-col z-20 transition-all duration-300">
            <div class="h-20 flex items-center px-6 border-b shrink-0">
                <div class="bg-indigo-600 p-2 rounded-lg mr-2 shadow-lg shadow-indigo-200">
                    <i data-lucide="sparkles" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-extrabold text-lg text-indigo-600 tracking-tight">AI Planner</span>
            </div>
            <nav class="flex-1 p-3 space-y-1">
                <button class="flex items-center gap-3 w-full p-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold shadow-sm">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> <span>Pano Görünümü</span>
                </button>
                <button class="flex items-center gap-3 w-full p-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i data-lucide="archive" class="w-5 h-5"></i> <span>Arşivlenmiş İşler</span>
                </button>
                <button class="flex items-center gap-3 w-full p-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> <span>Raporlar & Analiz</span>
                </button>
                <button class="flex items-center gap-3 w-full p-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i> <span>Ekipler</span>
                </button>
            </nav>
            <div class="p-4 border-t mt-auto">
                <div class="text-indigo-600 font-semibold italic text-sm flex items-center gap-2 px-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i> Yapay Zeka Asistanı
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8 z-10 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-bold text-slate-800">İş Takip Panosu</h2>
                    <div class="h-6 w-[1px] bg-slate-200 mx-2"></div>
                    <button class="flex items-center gap-2 text-sm font-semibold text-slate-600 border border-slate-200 px-4 py-1.5 rounded-full hover:bg-slate-50 transition-all">
                        <i data-lucide="filter" class="w-4 h-4"></i> Kişiye Göre Filtrele
                    </button>
                </div>
                <div class="flex items-center gap-4">
                    <button class="flex items-center gap-2 text-indigo-700 bg-indigo-50 border border-indigo-100 px-4 py-2 rounded-lg font-semibold hover:bg-indigo-100 transition-all">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> AI Analiz
                    </button>
                    <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg shadow-indigo-200 flex items-center gap-2 hover:bg-indigo-700 transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i> Yeni İş Ata
                    </button>
                    <div class="flex items-center gap-3 pl-4 border-l ml-2">
                        <div class="text-right hidden sm:block">
                            <p class="text-[10px] font-bold text-slate-400 uppercase leading-none">Hoş Geldiniz</p>
                            <p class="text-xs font-bold text-slate-700">Eren Şenyurt</p>
                        </div>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Eren" class="w-10 h-10 rounded-full border-2 border-indigo-100 shadow-sm" />
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-x-auto p-6 bg-[#F4F7FB] scrollbar-hide">
                <div class="flex gap-6 h-full">
                    <script type="text/template" id="col-template">
                        <div class="kanban-column flex flex-col gap-4">
                            <div class="flex items-center justify-between px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-2.5 h-2.5 rounded-full {{color}} shadow-sm"></div>
                                    <h3 class="font-bold text-xs text-slate-500 uppercase tracking-widest">{{title}}</h3>
                                    <span class="bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded text-[9px] font-bold">{{count}}</span>
                                </div>
                                <button class="text-slate-400 hover:text-indigo-600"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                            <div class="flex-1 overflow-y-auto space-y-3 pb-10 scrollbar-hide">
                                {{cards}}
                            </div>
                        </div>
                    </script>

                    <div id="board-container" class="flex gap-6 h-full">
                        <div class="kanban-column flex flex-col gap-4">
                            <div class="flex items-center justify-between px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-2.5 h-2.5 rounded-full bg-slate-400"></div>
                                    <h3 class="font-bold text-xs text-slate-500 uppercase tracking-widest">BACKLOG</h3>
                                </div>
                            </div>
                            <div class="flex-1 bg-slate-100/50 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-400 text-xs italic">Henüz iş yok</div>
                        </div>

                        <div class="kanban-column flex flex-col gap-4">
                            <div class="flex items-center justify-between px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-2.5 h-2.5 rounded-full bg-amber-400"></div>
                                    <h3 class="font-bold text-xs text-slate-500 uppercase tracking-widest">TODO</h3>
                                </div>
                            </div>
                            <div class="space-y-3">
                                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition-all cursor-grab active:cursor-grabbing group">
                                    <div class="flex items-start justify-between">
                                        <div class="flex gap-3">
                                            <div class="w-5 h-5 rounded-full border-2 border-slate-200 mt-0.5 group-hover:border-indigo-400"></div>
                                            <div>
                                                <h4 class="text-sm font-bold text-slate-800 leading-snug">Bordro analizi yapılacak</h4>
                                                <p class="text-[10px] text-slate-500 mt-1 line-clamp-1">Mart ayı personel verileri kontrol edilecek.</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mt-4 flex items-center justify-between border-t border-slate-50 pt-3">
                                        <div class="flex items-center gap-1 text-[10px] font-bold text-slate-400 uppercase"><i data-lucide="calendar" class="w-3 h-3 text-indigo-400"></i> 24.04</div>
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Pinar" class="w-5 h-5 rounded-full border border-indigo-50" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="kanban-column flex flex-col gap-4">
                            <div class="flex items-center justify-between px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-2.5 h-2.5 rounded-full bg-blue-500"></div>
                                    <h3 class="font-bold text-xs text-slate-500 uppercase tracking-widest">IN PROGRESS</h3>
                                </div>
                            </div>
                            <div class="flex-1 bg-slate-100/30 border-2 border-dashed border-slate-200 rounded-2xl"></div>
                        </div>

                        <div class="kanban-column flex flex-col gap-4">
                            <div class="flex items-center justify-between px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
                                    <h3 class="font-bold text-xs text-slate-500 uppercase tracking-widest">DONE</h3>
                                </div>
                            </div>
                            <div class="flex-1 bg-slate-100/30 border-2 border-dashed border-slate-200 rounded-2xl"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white w-[500px] p-8 rounded-3xl shadow-2xl transition-all scale-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Yeni İş Kalemi Ata</h2>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block ml-1">İş Başlığı</label>
                    <input type="text" placeholder="Görev adı..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-indigo-500/20 focus:border-indigo-500 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block ml-1">Açıklama</label>
                    <textarea placeholder="Detaylar..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl h-32 outline-none focus:ring-2 ring-indigo-500/20 focus:border-indigo-500 transition-all"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block ml-1">Tarih</label>
                        <input type="date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block ml-1">Öncelik</label>
                        <select class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            <option>Düşük</option>
                            <option selected>Orta</option>
                            <option>Yüksek</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="px-6 py-2 text-slate-500 font-bold hover:text-slate-700 transition-all">Vazgeç</button>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">İşi Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
